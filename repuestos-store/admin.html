<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Todo Importado</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>Administrador - Todo Importado</h1>
      <p>Panel seguro para administrar publicaciones, imágenes, precios, stock y pedidos.</p>
    </div>
  </header>

  <main class="container">
    <section class="panel" id="loginPanel">
      <h2>Login de administrador</h2>
      <form id="loginForm" class="admin-form">
        <input type="email" id="adminEmail" placeholder="Correo del administrador" required />
        <input type="password" id="adminPassword" placeholder="Contraseña" required />
        <button type="submit" class="btn btn-primary">Entrar</button>
      </form>
    </section>

    <section id="dashboard" style="display:none;">
      <section class="panel">
        <h2>Métricas</h2>
        <div class="metric-grid">
          <div class="metric">Ventas totales<strong id="metricSales">$0.00</strong></div>
          <div class="metric">Pedidos<strong id="metricOrders">0</strong></div>
          <div class="metric">Productos activos<strong id="metricProducts">0</strong></div>
          <div class="metric">Stock bajo<strong id="metricLowStock">0</strong></div>
        </div>
      </section>

      <section class="panel">
        <h2>Productos</h2>
        <div id="adminProductList" class="grid"></div>
      </section>

      <section class="panel">
        <h2>Crear producto</h2>
        <form id="createProductForm" class="admin-form">
          <input type="text" id="pName" placeholder="Nombre" required />
          <input type="number" id="pPrice" placeholder="Precio" required />
          <input type="number" id="pStock" placeholder="Stock" required />
          <input type="text" id="pCategory" placeholder="Categoría" required />
          <input type="text" id="pImage" placeholder="URL de imagen" required />
          <textarea id="pDescription" placeholder="Descripción" required></textarea>
          <button type="submit" class="btn btn-secondary">Guardar producto</button>
        </form>
      </section>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
